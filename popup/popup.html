<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapType</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f12;
      --surface:  #161a20;
      --border:   #252b34;
      --accent:   #00e5a0;
      --accent2:  #0af;
      --text:     #e8edf2;
      --muted:    #6b7a8d;
      --danger:   #ff4f6a;
      --mono:     'DM Mono', monospace;
      --display:  'Syne', sans-serif;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--display);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo span { opacity: 0.5; }

    /* Toggle Switch */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 11px; color: var(--muted); }
    .toggle {
      position: relative;
      width: 36px; height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 14px; height: 14px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before {
      transform: translateX(16px);
      background: var(--bg);
    }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 1px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
    }
    .stat-num {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
      margin: 4px 0;
    }

    /* ── Quick Add Form ── */
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .field-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .field-row.col { flex-direction: column; }

    label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }
    input[type="text"], textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }
    .abbr-input {
      width: 90px;
      flex-shrink: 0;
      font-weight: 500;
      color: var(--accent);
    }
    .abbr-input::placeholder { color: var(--muted); font-weight: 400; }
    textarea { height: 52px; }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Recent Snippets ── */
    .snippet-list {
      padding: 0;
      list-style: none;
      max-height: 140px;
      overflow-y: auto;
    }
    .snippet-list::-webkit-scrollbar { width: 3px; }
    .snippet-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .snippet-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
      cursor: default;
      transition: background 0.1s;
    }
    .snippet-item:hover { background: var(--surface); }
    .snippet-item:last-child { border-bottom: none; }
    .snippet-abbr {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      width: 80px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .snippet-text {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      display: flex;
      gap: 6px;
    }
    .footer .btn { font-size: 11px; padding: 7px 10px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: var(--bg);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Disabled overlay ── */
    .disabled-banner {
      display: none;
      background: rgba(255,79,106,0.08);
      border: 1px solid rgba(255,79,106,0.3);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--danger);
      text-align: center;
      margin: 10px 16px 0;
    }
    body.is-disabled .disabled-banner { display: block; }
    body.is-disabled .section { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">Snap<span>Type</span></div>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggleLabel">ON</span>
      <label class="toggle">
        <input type="checkbox" id="enabledToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Disabled Banner -->
  <div class="disabled-banner">⏸ SnapType is paused. Toggle ON to resume.</div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Snippets</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="statKey">Tab</div>
      <div class="stat-label">Trigger</div>
    </div>
  </div>

  <!-- Quick Add -->
  <div class="section">
    <div class="section-title">Quick Add</div>
    <div class="field-row">
      <div>
        <label>Abbreviation</label>
        <input type="text" class="abbr-input" id="quickAbbr" placeholder="myemail" maxlength="30" autocomplete="off" spellcheck="false">
      </div>
      <div style="flex:1">
        <label>Trigger</label>
        <input type="text" id="quickTriggerDisplay" readonly style="color:var(--muted); cursor:default;">
      </div>
    </div>
    <div class="field-row col">
      <label>Expansion Text</label>
      <textarea id="quickText" placeholder="What should it expand to?"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="clearBtn">Clear</button>
      <button class="btn btn-primary" id="saveBtn">Save Snippet</button>
    </div>
  </div>

  <!-- Recent Snippets -->
  <div class="section" style="padding: 12px 0; padding-top: 12px;">
    <div class="section-title" style="padding: 0 16px;">Recent Snippets</div>
    <ul class="snippet-list" id="snippetList">
      <li style="padding: 16px; text-align:center; color: var(--muted); font-size:12px;">Loading...</li>
    </ul>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn btn-ghost" id="openOptionsBtn" style="flex:2">⚙ Manage All</button>
    <button class="btn btn-ghost" id="exportBtn" style="flex:1">↑ Export</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
